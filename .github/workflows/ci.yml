name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  docker-build:
    name: Build & Push Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Build & Push
        uses: juninmd/base-actions/docker-build-push@main
        with:
          image-name: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to ArgoCD
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: ArgoCD Deploy
        uses: juninmd/base-actions/deploy-to-argocd@main
        with:
          app-name: meu-livro3
          image-tag: latest
          charts-token: ${{ secrets.GITHUB_TOKEN }}
